name: Live Desktop 1080p (WebSocket)

on:
  workflow_dispatch:

jobs:
  master:
    runs-on: ubuntu-latest
    steps:
      - name: نصب دسکتاپ و ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y xfce4 xfce4-goodies xvfb xdotool curl python3-pip maim imagemagick
          pip3 install flask flask-socketio eventlet

      - name: راه‌اندازی دسکتاپ و سرور WebSocket
        run: |
          export DISPLAY=:99
          # رزولوشن 1080p
          Xvfb :99 -screen 0 1920x1080x24 &
          
          # انتظار برای آماده شدن دیسپلی
          for i in $(seq 1 15); do
              if xdpyinfo -display :99 >/dev/null 2>&1; then
                  echo "✅ دیسپلی :99 بعد از $i ثانیه آماده شد"
                  break
              fi
              sleep 1
          done
          
          xfce4-session &
          sleep 3

          cat > server.py << 'PYEOF'
          import base64, subprocess, threading, time
          from flask import Flask, render_template_string
          from flask_socketio import SocketIO, emit

          app = Flask(__name__)
          socketio = SocketIO(app, async_mode='eventlet', cors_allowed_origins='*')

          HTML_PAGE = """
          <!DOCTYPE html>
          <html>
          <head><title>Remote Desktop</title>
          <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
          <style>
              body { margin:0; background:#000; overflow:hidden; }
              img { width:100vw; height:auto; display:block; cursor:crosshair; }
          </style>
          </head>
          <body>
              <img id="screen" src="" alt="Desktop">
              <script>
                  const socket = io();
                  const img = document.getElementById('screen');

                  socket.on('frame', (data) => {
                      img.src = 'data:image/jpeg;base64,' + data.image;
                  });

                  img.addEventListener('click', (e) => {
                      const rect = img.getBoundingClientRect();
                      const x = e.clientX - rect.left;
                      const y = e.clientY - rect.top;
                      const scaleX = 1920 / rect.width;
                      const scaleY = 1080 / rect.height;
                      socket.emit('click', {
                          x: Math.round(x * scaleX),
                          y: Math.round(y * scaleY)
                      });
                  });
              </script>
          </body>
          </html>
          """

          @app.route('/')
          def index():
              return render_template_string(HTML_PAGE)

          @socketio.on('click')
          def handle_click(data):
              x, y = data['x'], data['y']
              subprocess.run(f"DISPLAY=:99 xdotool mousemove {x} {y} click 1", shell=True)

          def frame_sender():
              while True:
                  # گرفتن اسکرین‌شات PNG و تبدیل به JPEG با کیفیت ۵۰٪
                  subprocess.run("maim -d :99 /tmp/screen.png", shell=True)
                  subprocess.run("convert /tmp/screen.png -quality 50 /tmp/screen.jpg", shell=True)
                  with open('/tmp/screen.jpg', 'rb') as f:
                      b64 = base64.b64encode(f.read()).decode()
                  socketio.emit('frame', {'image': b64})
                  time.sleep(0.1)  # ۱۰ فریم در ثانیه

          threading.Thread(target=frame_sender, daemon=True).start()

          if __name__ == '__main__':
              socketio.run(app, host='0.0.0.0', port=5000, allow_unsafe_werkzeug=True)
          PYEOF

          python3 server.py &

          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:5000 2>&1 | tee /tmp/cf-log &
          sleep 12
          URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/cf-log | head -n 1)
          echo "🌐 **لینک دسکتاپ زنده (WebSocket):** $URL"
          sleep 21600
