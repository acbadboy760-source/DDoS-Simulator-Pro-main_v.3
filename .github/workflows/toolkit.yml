name: NoVNC Cloud Desktop

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 🔑 دسترسی لازم برای مدیریت ورک‌فلوها
    permissions:
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 💾 بخش بازیابی کل حافظه سیستم (فایل‌ها، دانلودها و اطلاعات فایرفاکس)
      - name: Restore Persistent Data
        uses: actions/cache@v3
        with:
          path: |
            /home/runner/.mozilla
            /home/runner/Desktop
            /home/runner/Downloads
          key: vnc-desktop-${{ github.run_id }}
          restore-keys: |
            vnc-desktop-

      - name: Install Desktop Environment & Tools
        run: |
          sudo apt-get update
          # نصب محیط دسکتاپ سبک XFCE و ابزارهای VNC
          sudo apt-get install -y xfce4 xfce4-terminal tigervnc-standalone-server novnc websockify wget curl jq firefox
          
          # دانلود و نصب کلودفلرد برای تونل کردن
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Setup VNC Password & Display
        run: |
          mkdir -p ~/.vnc
          # تنظیم رمز عبور 123456
          echo "123456" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # تنظیم فایل استارت‌آپ برای لود شدن دسکتاپ
          echo -e "#!/bin/sh\nexport XKL_XMODMAP_DISABLE=1\nexec startxfce4" > ~/.vnc/xstartup
          chmod +x ~/.vnc/xstartup

          # 📁 ساخت پوشه‌های دسکتاپ و دانلودها در صورت عدم وجود
          mkdir -p /home/runner/Desktop
          mkdir -p /home/runner/Downloads

          # 🛑 ساخت اسکریپت اختصاصی برای خروج امن و ذخیره‌سازی اطلاعات
          echo -e "#!/bin/bash\ntouch /tmp/stop_desktop\necho 'در حال ذخیره‌سازی و خروج... لطفا تب مرورگر را ببندید.'" > /home/runner/Desktop/Stop_and_Save.sh
          chmod +x /home/runner/Desktop/Stop_and_Save.sh

      - name: Start VNC Server (Optimized for Low Bandwidth)
        run: |
          # اجرای سرور VNC با عمق رنگ 16 برای کاهش مصرف اینترنت و افزایش فریم ریت
          vncserver :1 -geometry 1280x720 -depth 16 -localhost no

      - name: Start NoVNC Web Socket
        run: |
          # تبدیل VNC به نسخه وب برای دسترسی از مرورگر
          websockify --web /usr/share/novnc/ 8080 localhost:5901 &

      - name: Start Cloudflare Tunnel & Print Link
        run: |
          # اجرای تونل کلودفلر
          cloudflared tunnel --url http://localhost:8080 --logfile cloudflared.log &
          
          # صبر میکنیم تا لینک ساخته بشه
          sleep 12
          
          # استخراج لینک موقت
          URL=$(grep -oE "https://[a-zA-Z0-9.-]+\.trycloudflare\.com" cloudflared.log | head -n 1)
          
          echo "===================================================================="
          echo "✅ دسکتاپ شما آماده است!"
          echo "🌐 برای اتصال، روی لینک زیر کلیک کنید:"
          echo "👉 $URL/vnc.html?autoconnect=true&resize=scale&quality=2&compression=9"
          echo "🔑 رمز عبور: 123456"
          echo "📱 نکته: لینک بالا برای گوشی بهینه‌سازی شده (تنظیم سایز خودکار و کمترین لگ)"
          echo "💾 آموزش ذخیره‌سازی: روی دسکتاپ فایلی به نام Stop_and_Save.sh وجود دارد."
          echo "   هر زمان کار ت تمام شد، روی آن دو بار کلیک کن و Execute را بزن تا اطلاعات مرورگر و فایل‌ها ذخیره شوند."
          echo "===================================================================="

      - name: Keep Alive (Safe Timer & Auto Save)
        run: |
          # این بخش هر دقیقه چک می‌کند که آیا کاربر دکمه خروج را زده یا زمان حداکثر (۵.۵ ساعت) به پایان رسیده است
          for i in {1..330}; do
            if [ -f /tmp/stop_desktop ]; then
              echo "🔴 دستور خروج امن صادر شد. در حال بستن سیستم و آپلود حافظه روی گیت‌هاب..."
              break
            fi
            sleep 60
          done
          echo "✅ پایان کار ورک‌فلو. اطلاعات با موفقیت ذخیره شدند."

      # 🔄 بخش جدید: اجرای خودکار مجدد ورک‌فلو برای ساخت حلقه بی‌انتها
      - name: Trigger Next Run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "🔄 در حال فرستادن دستور اجرای مجدد برای دور بعدی..."
          gh workflow run "NoVNC Cloud Desktop" --ref ${{ github.ref_name }}
